name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish main package
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish alias packages
        run: |
          npm publish --workspace=packages/pm-skills --access public
          npm publish --workspace=packages/product-management-skills --access public
          npm publish --workspace=packages/pm-playbook --access public
          npm publish --workspace=packages/pm-learning --access public
          npm publish --workspace=packages/pm-vibe-coding --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
